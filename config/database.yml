# PostgreSQL is required in every environment (good_job dependency).
# See https://guides.rubyonrails.org/configuring.html#configuring-a-database
#
# DATABASE_URL, if set, overrides these settings.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: zigbee2mqtt_capture_development
  host: <%= ENV.fetch("DATABASE_HOST", "postgres") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: zigbee2mqtt_capture_test
  host: <%= ENV.fetch("DATABASE_HOST", "postgres") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "zigbee2mqtt_capture_production") %>
  host: <%= ENV["DATABASE_HOST"] %>
  username: <%= ENV["DATABASE_USERNAME"] %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
